name: test-runner

on: [pull_request, workflow_dispatch]

env:
  AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: true

jobs:
  test:
    name: test
    runs-on: [self-hosted, colcon-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.TOKEN }}
      - name: Run test action
        uses: ./.github/actions/test/
